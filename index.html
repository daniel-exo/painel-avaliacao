<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Avaliação de Colaboradores</title>
<link rel="stylesheet" href="styles.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="data.js?v=2"></script>
</head>
<body>

<header>
  <div>
    <h1>Painel de Avaliação de Colaboradores</h1>
    <div class="meta" id="lastUpdated">Carregando dados...</div>
    <div class="meta">desenvolvido pela EXO exclusivamente para Indorama.</div>
  </div>
  <div class="header-actions">
    <a class="btn btn-blue" href="categorias.html">Ver por categoria</a>
    <a class="btn btn-blue" href="comparativo.html">Comparativo</a>
    <button class="btn btn-secondary" id="downloadBtn">Baixar Excel com todas as respostas</button>
    <button class="btn btn-green" id="refreshBtn">Atualizar agora</button>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <div class="filter-field">
      <label for="filterAvaliador">Avaliador</label>
      <select id="filterAvaliador"><option value="">Todos</option></select>
    </div>
    <div class="filter-field">
      <label for="filterAvaliado">Avaliado</label>
      <select id="filterAvaliado"><option value="">Todos</option></select>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading" id="loadingMsg">Buscando respostas da planilha…</div>
</main>

<footer>
  <img class="footer-logo" src="exo-logo.png" alt="EXO">
  <div>Dados carregados diretamente do Google Sheets publicado. Atualiza automaticamente a cada 5 minutos.</div>
</footer>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="closeModal">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let charts = {};
let lastData = null;

async function loadData(){
  document.getElementById("loadingMsg").style.display = "block";
  try{
    if(typeof Chart === "undefined"){
      throw new Error("Biblioteca Chart.js não carregou. Verifique bloqueador de anúncios, firewall ou extensão de privacidade que possa estar bloqueando cdn.jsdelivr.net.");
    }
    const data = await loadDashboardData();
    lastData = data;
    initFilterBar(data, (av, ad) => {
      const filtered = filterRowStats(data.rowStats, av, ad);
      render(data, filtered);
    });
    document.getElementById("lastUpdated").textContent =
      "Última atualização: " + new Date().toLocaleString("pt-BR");
  }catch(err){
    document.getElementById("main").innerHTML =
      '<div class="empty">Não foi possível carregar os dados agora. (' + err.message + ')<br>Verifique se o link do CSV publicado ainda está ativo.</div>';
    console.error(err);
  }
}

function render(data, rowStats){
  const {categories, categoryColorMap} = data;

  if(rowStats.length === 0){
    document.getElementById("main").innerHTML = '<div class="empty">Nenhuma resposta encontrada para esse filtro.</div>';
    return;
  }

  const agg = computeAggregates(rowStats, categories, data.questionFields);
  const {overallAvg, catOverallAvg, bestCat, worstCat} = agg;

  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="kpis">
      <div class="kpi">
        <div class="label">Total de respostas</div>
        <div class="value">${rowStats.length}</div>
      </div>
      <div class="kpi">
        <div class="label">Média geral</div>
        <div class="value ${scoreTextClass(overallAvg)}">${fmt(overallAvg)}</div>
        <div class="sub">escala de 1 a 5</div>
      </div>
      <div class="kpi">
        <div class="label">Categoria mais forte</div>
        <div class="value ${scoreTextClass(catOverallAvg[bestCat])}">${fmt(catOverallAvg[bestCat])}</div>
        <div class="sub">${bestCat ?? "-"}</div>
      </div>
      <div class="kpi">
        <div class="label">Categoria a desenvolver</div>
        <div class="value ${scoreTextClass(catOverallAvg[worstCat])}">${fmt(catOverallAvg[worstCat])}</div>
        <div class="sub">${worstCat ?? "-"}</div>
      </div>
    </div>

    <div class="charts">
      <div class="card">
        <h2>Média por categoria</h2>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
      <div class="card">
        <h2>Comparativo (radar)</h2>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <h2>Evolução da média geral por resposta</h2>
      <div class="chart-wrap" style="height:220px;"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="card">
      <h2>Respostas individuais</h2>
      <table>
        <thead>
          <tr>
            <th>Data/Hora</th>
            <th>Média Geral</th>
            <th>Por categoria</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="responseRows"></tbody>
      </table>
    </div>
  `;

  // bar chart
  if(charts.bar) charts.bar.destroy();
  charts.bar = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: categories,
      datasets: [{
        label: "Média",
        data: categories.map(c => catOverallAvg[c]),
        backgroundColor: categories.map(c => categoryColorMap[c])
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales:{ y:{ min:0, max:5 } },
      plugins:{ legend:{display:false} }
    }
  });

  // radar chart
  if(charts.radar) charts.radar.destroy();
  charts.radar = new Chart(document.getElementById("radarChart"), {
    type:"radar",
    data:{
      labels: categories,
      datasets:[{
        label:"Média por categoria",
        data: categories.map(c => catOverallAvg[c]),
        backgroundColor:"rgba(0,45,114,0.20)",
        borderColor:"#002D72",
        pointBackgroundColor:"#002D72"
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{ r:{ min:0, max:5 } }
    }
  });

  // trend chart
  if(charts.trend) charts.trend.destroy();
  charts.trend = new Chart(document.getElementById("trendChart"), {
    type:"line",
    data:{
      labels: rowStats.map(s => s.timestamp),
      datasets:[{
        label:"Média geral",
        data: rowStats.map(s => s.overall),
        borderColor:"#0b5fff",
        backgroundColor:"rgba(11,95,255,0.1)",
        fill:true, tension:.25
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      scales:{ y:{ min:0, max:5 } },
      plugins:{ legend:{display:false} }
    }
  });

  // table rows
  const tbody = document.getElementById("responseRows");
  tbody.innerHTML = "";
  rowStats.forEach((s, idx) => {
    const tr = document.createElement("tr");
    const pills = categories.map(c => {
      const v = s.catAvg[c];
      return `<span class="cat-pill"><span class="cat-dot" style="background:${categoryColorMap[c]}"></span>${c}: ${fmt(v)}</span>`;
    }).join("");
    tr.innerHTML = `
      <td>${s.timestamp || "-"}</td>
      <td><span class="badge ${scoreClass(s.overall)}">${fmt(s.overall)}</span></td>
      <td>${pills}</td>
      <td><span class="link" data-idx="${idx}">Ver detalhes</span></td>
    `;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll(".link").forEach(el => {
    el.addEventListener("click", () => openDetailModal(rowStats[el.dataset.idx], data));
  });
}

wireModalClose();
document.getElementById("refreshBtn").addEventListener("click", loadData);
document.getElementById("downloadBtn").addEventListener("click", () => downloadExcelFromData(lastData));

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
