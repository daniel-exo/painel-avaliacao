<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel por Categoria — Avaliação de Colaboradores</title>
<link rel="stylesheet" href="styles.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="data.js?v=2"></script>
</head>
<body>

<header>
  <div>
    <h1>Painel por Categoria</h1>
    <div class="meta" id="lastUpdated">Carregando dados...</div>
    <div class="meta">Desenvolvido pela EXO exclusivamente para a Indorama.</div>
  </div>
  <div class="header-actions">
    <a class="btn btn-blue" href="index.html">← Voltar ao painel</a>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <div class="filter-field">
      <label for="filterAvaliador">Avaliador</label>
      <select id="filterAvaliador"><option value="">Todos</option></select>
    </div>
    <div class="filter-field">
      <label for="filterAvaliado">Avaliado</label>
      <select id="filterAvaliado"><option value="">Todos</option></select>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading" id="loadingMsg">Buscando respostas da planilha…</div>
</main>

<footer>
  <img class="footer-logo" src="exo-logo.png" alt="EXO">
  <div>Dados carregados diretamente do Google Sheets publicado. Atualiza automaticamente a cada 5 minutos.</div>
</footer>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="closeModal">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let charts = {};
let lastData = null;

async function loadData(){
  document.getElementById("loadingMsg").style.display = "block";
  try{
    if(typeof Chart === "undefined"){
      throw new Error("Biblioteca Chart.js não carregou. Verifique bloqueador de anúncios, firewall ou extensão de privacidade que possa estar bloqueando cdn.jsdelivr.net.");
    }
    const data = await loadDashboardData();
    lastData = data;
    initFilterBar(data, (av, ad) => {
      const filtered = filterRowStats(data.rowStats, av, ad);
      render(data, filtered);
    });
    document.getElementById("lastUpdated").textContent =
      "Última atualização: " + new Date().toLocaleString("pt-BR");
  }catch(err){
    document.getElementById("main").innerHTML =
      '<div class="empty">Não foi possível carregar os dados agora. (' + err.message + ')<br>Verifique se o link do CSV publicado ainda está ativo.</div>';
    console.error(err);
  }
}

function render(data, rowStats){
  const {questionFields, categories, categoryColorMap, categorySubtitles} = data;

  if(rowStats.length === 0){
    document.getElementById("main").innerHTML = '<div class="empty">Nenhuma resposta encontrada para esse filtro.</div>';
    return;
  }

  const agg = computeAggregates(rowStats, categories, questionFields);
  const {catOverallAvg, questionAvg, bestQuestion, worstQuestion} = agg;

  const main = document.getElementById("main");

  const kpisHTML = `
    <div class="kpis">
      <div class="kpi">
        <div class="label">Pergunta mais forte</div>
        <div class="value ${scoreTextClass(bestQuestion?.avg)}">${fmt(bestQuestion?.avg)}</div>
        <div class="sub">${bestQuestion?.category ?? "-"}</div>
        <div class="sub question">${bestQuestion?.question ?? "-"}</div>
      </div>
      <div class="kpi">
        <div class="label">Pergunta a desenvolver</div>
        <div class="value ${scoreTextClass(worstQuestion?.avg)}">${fmt(worstQuestion?.avg)}</div>
        <div class="sub">${worstQuestion?.category ?? "-"}</div>
        <div class="sub question">${worstQuestion?.question ?? "-"}</div>
      </div>
    </div>
  `;

  const sectionsHTML = categories.map((cat, ci) => {
    const qs = questionFields.filter(q => q.category === cat);
    const chartHeight = Math.max(qs.length * 42 + 20, 140);
    return `
    <div class="card">
      <h2><span class="cat-dot" style="background:${categoryColorMap[cat]}"></span>${cat}
        <span class="badge ${scoreClass(catOverallAvg[cat])}" style="margin-left:auto;">${fmt(catOverallAvg[cat])}</span>
      </h2>
      ${categorySubtitles[cat] ? `<div class="cat-subtitle">${categorySubtitles[cat]}</div>` : ""}
      <div class="chart-wrap" style="height:${chartHeight}px;"><canvas id="cat-chart-${ci}"></canvas></div>
      <table>
        <thead>
          <tr>
            <th>Pergunta</th>
            <th>Média</th>
          </tr>
        </thead>
        <tbody id="cat-rows-${ci}"></tbody>
      </table>
    </div>
  `;
  }).join("");

  main.innerHTML = kpisHTML + sectionsHTML;

  categories.forEach((cat, ci) => {
    const qs = questionFields.filter(q => q.category === cat);
    if(charts["cat"+ci]) charts["cat"+ci].destroy();
    charts["cat"+ci] = new Chart(document.getElementById("cat-chart-"+ci), {
      type: "bar",
      data: {
        labels: qs.map(q => wrapLabel(q.question)),
        datasets: [{
          label: "Média",
          data: qs.map(q => questionAvg[q.field]),
          backgroundColor: categoryColorMap[cat]
        }]
      },
      options: {
        indexAxis: "y",
        responsive:true, maintainAspectRatio:false,
        scales:{ x:{ min:0, max:5 }, y:{ ticks:{ autoSkip:false } } },
        plugins:{ legend:{display:false} }
      }
    });

    const tbody = document.getElementById("cat-rows-"+ci);
    tbody.innerHTML = "";
    qs.forEach(q => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${q.question}</td>
        <td><span class="badge ${scoreClass(questionAvg[q.field])}">${fmt(questionAvg[q.field])}</span></td>
      `;
      tbody.appendChild(tr);
    });
  });
}

wireModalClose();

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
