<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparativo — Avaliação de Colaboradores</title>
<link rel="stylesheet" href="styles.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="data.js?v=2"></script>
</head>
<body>

<header>
  <div>
    <h1>Comparativo: Autoavaliação vs Colegas</h1>
    <div class="meta" id="lastUpdated">Carregando dados...</div>
    <div class="meta">desenvolvido pela EXO exclusivamente para Indorama.</div>
  </div>
  <div class="header-actions">
    <a class="btn btn-blue" href="index.html">← Voltar ao painel</a>
    <button class="btn btn-secondary" id="downloadBtn">Baixar Excel com todas as respostas</button>
    <button class="btn btn-green" id="refreshBtn">Atualizar agora</button>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <div class="filter-field">
      <label for="filterAvaliador">Avaliador</label>
      <select id="filterAvaliador"><option value="">Todos</option></select>
    </div>
    <div class="filter-field">
      <label for="filterAvaliado">Avaliado</label>
      <select id="filterAvaliado"><option value="">Todos</option></select>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading" id="loadingMsg">Buscando respostas da planilha…</div>
</main>

<footer>
  <img class="footer-logo" src="exo-logo.png" alt="EXO">
  <div>Dados carregados diretamente do Google Sheets publicado. Atualiza automaticamente a cada 5 minutos.</div>
</footer>

<script>
const SELF_COLOR = "#002D72";
const PEER_COLOR = "#009933";
let charts = {};
let lastData = null;

async function loadData(){
  document.getElementById("loadingMsg").style.display = "block";
  try{
    if(typeof Chart === "undefined"){
      throw new Error("Biblioteca Chart.js não carregou. Verifique bloqueador de anúncios, firewall ou extensão de privacidade que possa estar bloqueando cdn.jsdelivr.net.");
    }
    const data = await loadDashboardData();
    lastData = data;

    if(getSubjectNames(data).length === 0){
      document.getElementById("main").innerHTML =
        '<div class="empty">Nenhuma resposta com identificação de colaborador foi encontrada ainda.<br>Confira se o formulário inclui as perguntas de nome e "Quem você vai avaliar?".</div>';
    } else {
      initFilterBar(data, (av, ad) => {
        const filtered = filterRowStats(data.rowStats, av, ad);
        const label = ad || "Todos os colaboradores";
        renderComparison(data, filtered, label);
      });
    }

    document.getElementById("lastUpdated").textContent =
      "Última atualização: " + new Date().toLocaleString("pt-BR");
  }catch(err){
    document.getElementById("main").innerHTML =
      '<div class="empty">Não foi possível carregar os dados agora. (' + err.message + ')<br>Verifique se o link do CSV publicado ainda está ativo.</div>';
    console.error(err);
  }
}

function diffLabel(diff){
  if(diff === null || diff === undefined || isNaN(diff)) return "-";
  return (diff > 0 ? "+" : "") + fmt(diff);
}

function renderComparison(data, rowStats, subjectLabel){
  const comp = computeComparison(rowStats, data.categories, data.questionFields);
  const main = document.getElementById("main");

  if(comp.selfCount === 0 && comp.peerCount === 0){
    main.innerHTML = '<div class="empty">Nenhuma resposta encontrada para esse filtro.</div>';
    return;
  }

  const catHTML = `
    <div class="card">
      <h2>${subjectLabel} — comparação por categoria</h2>
      <div class="comparison-legend">
        <span><span class="legend-dot" style="background:${SELF_COLOR};"></span>Autoavaliação (${comp.selfCount} resposta${comp.selfCount===1?"":"s"})</span>
        <span><span class="legend-dot" style="background:${PEER_COLOR};"></span>Avaliação dos colegas (${comp.peerCount} resposta${comp.peerCount===1?"":"s"})</span>
      </div>
      <div class="chart-wrap"><canvas id="catCompareChart"></canvas></div>
      <table>
        <thead>
          <tr><th>Categoria</th><th>Autoavaliação</th><th>Colegas</th><th>Diferença</th></tr>
        </thead>
        <tbody>
          ${comp.categoryComparison.map(c => `
            <tr>
              <td>${c.category}</td>
              <td>${fmt(c.self)}</td>
              <td>${fmt(c.peer)}</td>
              <td class="${gapClass(c.diff)}">${diffLabel(c.diff)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;

  const sectionsHTML = data.categories.map((cat, ci) => {
    const qs = comp.questionComparison.filter(q => q.category === cat);
    const chartHeight = Math.max(qs.length * 46 + 20, 160);
    return `
    <div class="card">
      <h2><span class="cat-dot" style="background:${data.categoryColorMap[cat]}"></span>${cat}</h2>
      ${data.categorySubtitles[cat] ? `<div class="cat-subtitle">${data.categorySubtitles[cat]}</div>` : ""}
      <div class="chart-wrap" style="height:${chartHeight}px;"><canvas id="qCompareChart-${ci}"></canvas></div>
      <table>
        <thead>
          <tr><th>Pergunta</th><th>Autoavaliação</th><th>Colegas</th><th>Diferença</th></tr>
        </thead>
        <tbody>
          ${qs.map(q => `
            <tr>
              <td>${q.question}</td>
              <td>${fmt(q.self)}</td>
              <td>${fmt(q.peer)}</td>
              <td class="${gapClass(q.diff)}">${diffLabel(q.diff)}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
  }).join("");

  main.innerHTML = catHTML + sectionsHTML;

  // gráfico comparativo por categoria
  if(charts.cat) charts.cat.destroy();
  charts.cat = new Chart(document.getElementById("catCompareChart"), {
    type: "bar",
    data: {
      labels: comp.categoryComparison.map(c => c.category),
      datasets: [
        { label:"Autoavaliação", data: comp.categoryComparison.map(c => c.self), backgroundColor: SELF_COLOR },
        { label:"Colegas", data: comp.categoryComparison.map(c => c.peer), backgroundColor: PEER_COLOR }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales:{ y:{ min:0, max:5 } },
      plugins:{ legend:{ display:false } }
    }
  });

  // gráficos comparativos por pergunta, um por categoria
  data.categories.forEach((cat, ci) => {
    const qs = comp.questionComparison.filter(q => q.category === cat);
    const canvas = document.getElementById("qCompareChart-"+ci);
    if(!canvas) return;
    if(charts["q"+ci]) charts["q"+ci].destroy();
    charts["q"+ci] = new Chart(canvas, {
      type: "bar",
      data: {
        labels: qs.map(q => wrapLabel(q.question)),
        datasets: [
          { label:"Autoavaliação", data: qs.map(q => q.self), backgroundColor: SELF_COLOR },
          { label:"Colegas", data: qs.map(q => q.peer), backgroundColor: PEER_COLOR }
        ]
      },
      options: {
        indexAxis: "y",
        responsive:true, maintainAspectRatio:false,
        scales:{ x:{ min:0, max:5 }, y:{ ticks:{ autoSkip:false } } },
        plugins:{ legend:{ display:false } }
      }
    });
  });
}

document.getElementById("refreshBtn").addEventListener("click", loadData);
document.getElementById("downloadBtn").addEventListener("click", () => downloadExcelFromData(lastData));

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
